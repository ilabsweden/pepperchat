<html>
    <style>
        #main{
            width: 100vw;
            height: 100vh;
            background-color: beige;
            font-family: sans-serif;
            font-size: 8vh;
        }
        #main.noConnection{
            background-color: gray;
        }
        .sentence{
            margin-bottom: 5vh;
        }
    </style>
    <body>
        
        <div id="main">
            
        </div>
    </body>
    <script>
        function sendData(target, data, resultCallback, errorCallback) {
            var dataStr="";
            if(data instanceof FormData){
                data=Object.fromEntries(data);
            }
            if(data.charAt){
                dataStr=data;
                if(dataStr.indexOf("=")>=0){
                    sendData("",{badDataInSendData:data, badDataSrc:window.location.href});
                }
            }
            else{
                dataStr = Object.keys(data).map(key => encodeURIComponent(key) + '=' + encodeURIComponent(data[key])).join('&');
            }
            var xmlhttp = new XMLHttpRequest();

            xmlhttp.onreadystatechange = function() {
                if (xmlhttp.readyState == 4 && xmlhttp.status == 200) {
                    if (resultCallback != null) {
                        resultCallback(xmlhttp.responseText);
                    }
                }
            };
            xmlhttp.onerror=function(err){
                if(errorCallback){
                    errorCallback(err);
                }
            };
            xmlhttp.open("POST", target, true);
            xmlhttp.setRequestHeader("Content-type", "application/x-www-form-urlencoded");
            xmlhttp.send(dataStr);

        }
        main = document.getElementById("main");

        function splitKeep(text) {
            const parts = text.split(/([.?!])/);
            const out = [];

            for (let i = 0; i < parts.length - 1; i += 2) {
                out.push(parts[i] + parts[i + 1]);
            }

            return out;
        }
        function showText(text){
            main.innerHTML = ""
            sentences = splitKeep(text);
            sentences.forEach((s)=>{main.innerHTML += "<div class='sentence'>" + s + "</div>"});

        }
        function poll(){
            // showText("Hej! Jag ser att du verkar undra över något. Jag är här för att hjälpa dig. Vill du berätta lite mer om vad som hände? Då kan vi försöka reda ut det tillsammans.");
            // return;
            sendData("", {"get_subtitles":1},(response)=>{
                console.log(response);
                showText(response);
                main.classList.toggle("noConnection", false);
                poll();
            }, (err)=>{
                main.innerHTML="No connection to subtitle server";
                main.classList.toggle("noConnection", true);
                window.setTimeout(poll, 1000);
            })
        }
        poll();
    </script>
</html>
